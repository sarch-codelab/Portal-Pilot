<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Acceder | PortalPilot</title><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style> * { margin:0; padding:0; box-sizing:border-box; } body { font-family:'Inter',sans-serif; min-height:100vh; background:radial-gradient(circle at 20% 30%, #0A0E17, #05080F); display:flex; align-items:center; justify-content:center; padding:20px; } .glass-panel { background:rgba(17,24,39,0.7); backdrop-filter:blur(16px); border:1px solid rgba(14,165,233,0.3); border-radius:48px; padding:48px; text-align:center; max-width:500px; width:100%; box-shadow:0 25px 50px -12px black; transition:0.3s; } .logo-icon { width:80px; height:80px; background:linear-gradient(135deg,#0EA5E9,#3B82F6); border-radius:24px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; } .logo-icon i { font-size:44px; color:white; } h1 { font-size:32px; margin-bottom:12px; } p { color:#A0AEC0; margin-bottom:32px; } .btn-group { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; } .btn { padding:12px 28px; border-radius:40px; font-weight:600; text-decoration:none; transition:0.3s; display:inline-flex; align-items:center; gap:8px; } .btn-primary { background:linear-gradient(135deg,#0EA5E9,#3B82F6); color:white; } .btn-outline { border:1px solid rgba(14,165,233,0.5); color:#0EA5E9; } .btn:hover { transform:translateY(-3px); box-shadow:0 10px 20px -5px rgba(14,165,233,0.4); } .info { margin-top:32px; padding:16px; background:rgba(14,165,233,0.1); border-radius:24px; font-size:13px; color:#718096; } </style></head>
<body><div class="glass-panel"><div class="logo-icon"><i class="fas fa-robot"></i></div><h1>PortalPilot + Cyberyx</h1><p>Accede a tu cuenta empresarial</p><div class="btn-group"><a href="#" id="openAppBtn" class="btn btn-primary"><i class="fas fa-external-link-alt"></i> Abrir Aplicación</a><a href="index.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Volver al Sitio</a></div><div class="info"><i class="fas fa-info-circle"></i> Para acceder al sistema, descarga e instala la aplicación PortalPilot en tu computadora.<br><br>¿No tienes cuenta? <a href="compra.html" style="color:#0EA5E9;">Solicita una demo</a></div></div><script>document.getElementById('openAppBtn')?.addEventListener('click',(e)=>{e.preventDefault(); window.location.href='portalpilot://login'; setTimeout(()=>{alert('Si la aplicación no se abre automáticamente, asegúrate de tener PortalPilot instalado.');},1000);});</script></body>
</html>
